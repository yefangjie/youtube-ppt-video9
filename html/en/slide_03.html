<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthcare Sector Surge</title>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; justify-content: center; height: 100vh; padding: 0 10%; }
        h1 { font-size: 3em; color: #4DA8DA; border-bottom: 2px solid #333; padding-bottom: 10px; }
        ul { font-size: 1.8em; line-height: 1.8; color: #eee; }
    </style>
</head>
<body>
    <h1>Healthcare Sector Surge</h1>
    <ul>
        <li>Healthcare added <strong>76,000</strong> positions</li>
        <li>Accounts for over <strong>40%</strong> of the growth</li>
        <li>Reason: End of the Kaiser Permanente strike</li>
        <li>Detail: 31,000 nursing staff returned to work</li>
    </ul>
<script>document.addEventListener("keydown", (e) => { if(e.key === "ArrowRight" || e.key === "Space") window.parent.postMessage("next", "*"); if(e.key === "ArrowLeft") window.parent.postMessage("prev", "*"); });</script></body>
</html>
