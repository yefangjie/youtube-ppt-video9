<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>March Non-Farm Payrolls & Geopolitical Impacts - Presentation</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; font-family: -apple-system, sans-serif; }
        #slide-frame { width: 100%; height: 100%; border: none; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; z-index: 1000; }
        button { background: #4DA8DA; color: #fff; border: none; padding: 10px 20px; font-size: 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3a8bb8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .page-indicator { color: white; display: flex; align-items: center; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <iframe id="slide-frame" src="slide_01.html"></iframe>
    <div class="controls">
        <button id="btn-prev" onclick="prev()" disabled>Prev</button>
        <span class="page-indicator"><span id="current-page">1</span> / 4</span>
        <button id="btn-next" onclick="next()">Next</button>
    </div>

    <script>
        let current = 1;
        const total = 4;
        const frame = document.getElementById('slide-frame');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const pageIndicator = document.getElementById('current-page');

        function update() {
            frame.src = `slide_0${current}.html`;
            pageIndicator.innerText = current;
            btnPrev.disabled = current === 1;
            btnNext.disabled = current === total;
        }

        function next() {
            if(current < total) {
                current++;
                update();
            }
        }

        function prev() {
            if(current > 1) {
                current--;
                update();
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'Space') next();
            if(e.key === 'ArrowLeft') prev();
        });
    </script>
</body>
</html>
