<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3月非农数据与地缘政治经济影响 - 幻灯片</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; font-family: -apple-system, sans-serif; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; z-index: 1000; }
        button { background: #4DA8DA; color: #fff; border: none; padding: 10px 20px; font-size: 16px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #3a8bb8; }
        button:disabled { background: #555; cursor: not-allowed; }
        .page-indicator { color: white; display: flex; align-items: center; font-size: 16px; font-weight: bold; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <iframe class="slide" id="slide-frame" src="slide_01.html"></iframe>
    <div class="controls">
        <button id="btn-prev" onclick="prev()">上一页</button>
        <span class="page-indicator"><span id="current-page">1</span> / 4</span>
        <button id="btn-next" onclick="next()">下一页</button>
    </div>

    <script>
        let current = parseInt(new URLSearchParams(window.location.search).get('p')) || 1;
        const total = 4;
        
        function update() {
            document.getElementById('slide-frame').src = `slide_0${current}.html`;
            document.getElementById('current-page').innerText = current;
            document.getElementById('btn-prev').disabled = current === 1;
            document.getElementById('btn-next').disabled = current === total;
            window.history.replaceState(null, null, `?p=${current}`);
            
            // Re-focus main window to allow keyboard events
            window.focus();
        }

        function next() {
            if(current < total) {
                current++;
                update();
            }
        }

        function prev() {
            if(current > 1) {
                current--;
                update();
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowRight' || e.key === 'Space') next();
            if(e.key === 'ArrowLeft') prev();
        });

        // Initialize
        update();
        
        // Listen to messages from iframe to handle keyboard events
        window.addEventListener('message', function(e) {
            if (e.data === 'next') next();
            if (e.data === 'prev') prev();
        });
    </script>
</body>
</html>
